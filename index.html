<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>Conferences</title>
    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="main.js"></script>
    <style>
      .hidden-onload {
        display: none;
      }
      .conferences-list {
        table-layout: fixed;
        overflow-wrap: anywhere;
      }
      @media only screen and (max-width: 40em) {
        .conferences-list {
          font-size: xx-small;
        }
      }
      table {
        margin-top: 1.5em;
        margin-bottom: 1.5em;
        width: 100%;
        border: none;
        table-layout: auto;
        border-spacing: 0;
        border-collapse: collapse;
      }
      th, td {
        padding: 0.5em 0.5em;
        border: 1px solid;
        border-color: #dddddd;
      }
    </style>
  </head>
  <body>
    <h2>国際会議</h2>
    <div id="conferences-list-international"></div>
    <h2>国内会議</h2>
    <div id="conferences-list-domestic"></div>
  </body>
</html>
